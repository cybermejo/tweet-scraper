name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: scraper (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: scraper/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # Same validation loop you run locally — see CLAUDE.md "Validation".
      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy tweet_scraper.py

      - name: Tests (pytest + coverage)
        run: pytest --cov=tweet_scraper --cov-report=term-missing
